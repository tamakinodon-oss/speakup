<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="SpeakUp"/>
<meta name="theme-color" content="#0a0a0f"/>
<title>SpeakUp</title>

<!-- PWA icons (inline SVG as data URI) -->
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230a0a0f'/%3E%3Ctext x='90' y='125' font-size='100' text-anchor='middle'%3E%F0%9F%97%A3%EF%B8%8F%3C/text%3E%3C/svg%3E"/>
<link rel="manifest" href="data:application/json,%7B%22name%22%3A%22SpeakUp%22%2C%22short_name%22%3A%22SpeakUp%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%230a0a0f%22%2C%22theme_color%22%3A%22%230a0a0f%22%7D"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--c:#4ade80}
html,body{height:100%;overflow:hidden}
body{background:#0a0a0f;font-family:-apple-system,'Segoe UI',sans-serif;color:#e8e8f0;display:flex;flex-direction:column;padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}

/* screens */
.screen{display:none;flex-direction:column;height:100%;overflow-y:auto;padding:20px 20px 30px}
.screen.active{display:flex}

/* header */
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:24px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;background:none;border:none;color:#e8e8f0;font-size:18px;font-weight:700;letter-spacing:-.5px;cursor:pointer;padding:0}
.logo-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;background:linear-gradient(135deg,color-mix(in srgb,var(--c) 20%,transparent),color-mix(in srgb,var(--c) 53%,transparent));border:1.5px solid color-mix(in srgb,var(--c) 40%,transparent)}
.chip{background:color-mix(in srgb,var(--c) 13%,transparent);border:1px solid color-mix(in srgb,var(--c) 35%,transparent);color:var(--c);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.hbtn{background:#ffffff0f;border:1px solid #ffffff22;color:#888;border-radius:8px;padding:5px 10px;font-size:12px;cursor:pointer}

/* level select */
.hero{text-align:center;margin-bottom:32px}
.hero h1{font-size:clamp(26px,7vw,38px);font-weight:800;letter-spacing:-1.5px;line-height:1.1}
.hero p{color:#888;margin-top:12px;font-size:14px}
.sec-label{color:#666;font-size:12px;font-weight:600;letter-spacing:1px;text-transform:uppercase;margin-bottom:14px}
.level-btn{width:100%;background:#111118;border:1.5px solid #ffffff18;border-radius:16px;padding:18px 20px;cursor:pointer;display:flex;align-items:center;gap:14px;text-align:left;color:#e8e8f0;margin-bottom:10px;-webkit-appearance:none}
.level-btn:active{opacity:.75}
.lv-icon{width:44px;height:44px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:22px;background:color-mix(in srgb,var(--lc) 13%,transparent);border:1.5px solid color-mix(in srgb,var(--lc) 35%,transparent)}
.lv-name{font-weight:700;font-size:16px}
.lv-desc{color:#888;font-size:12px;margin-top:2px}
.info-box{margin-top:24px;padding:16px;border-radius:14px;background:#0d1520;border:1px solid #1a2a3a;color:#6aa;font-size:13px;line-height:1.7}

/* topic */
.topic-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.topic-btn{background:#111118;border:1.5px solid #ffffff18;border-radius:14px;padding:18px 14px;cursor:pointer;text-align:left;color:#e8e8f0;-webkit-appearance:none}
.topic-btn:active{opacity:.75}
.t-icon{font-size:26px;margin-bottom:8px}
.t-label{font-weight:600;font-size:13px}

/* chat */
#chatScreen{padding:0}
.chat-inner{display:flex;flex-direction:column;height:100%}
.chat-topbar{flex-shrink:0;padding:16px 16px 0;display:flex;align-items:center;justify-content:space-between;gap:8px}
.messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px}
.msg-row{display:flex;gap:8px;align-items:flex-start}
.msg-row.user{flex-direction:row-reverse}
.avatar{width:30px;height:30px;border-radius:9px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:13px;background:color-mix(in srgb,var(--c) 13%,transparent);border:1px solid color-mix(in srgb,var(--c) 27%,transparent)}
.bubble{border-radius:4px 14px 14px 14px;padding:11px 14px;max-width:80%;font-size:14px;line-height:1.6;background:#161620;border:1px solid #ffffff12;color:#dde}
.msg-row.user .bubble{border-radius:14px 4px 14px 14px;background:color-mix(in srgb,var(--c) 13%,transparent);border-color:color-mix(in srgb,var(--c) 27%,transparent);color:var(--c)}
.replay-btn{background:none;border:none;color:#666;cursor:pointer;font-size:12px;padding:0;vertical-align:middle;margin-left:6px}
.dots{display:flex;gap:4px;align-items:center}
.dot{width:6px;height:6px;border-radius:50%;background:color-mix(in srgb,var(--c) 53%,transparent);animation:bounce 1s var(--d,0s) infinite}

/* status */
.status{flex-shrink:0;margin:0 12px 6px;padding:7px 12px;border-radius:10px;font-size:12px;display:none;align-items:center;gap:7px}
.status.show{display:flex}
.st-speak{background:color-mix(in srgb,var(--c) 7%,transparent);border:1px solid color-mix(in srgb,var(--c) 20%,transparent);color:var(--c)}
.st-listen{background:#ff444411;border:1px solid #ff444433;color:#ff8888}
.rec-dot{width:7px;height:7px;border-radius:50%;background:#ff4444;animation:pulse 1s infinite;flex-shrink:0}
.stop-btn{margin-left:auto;background:none;border:none;color:#888;cursor:pointer;font-size:11px}

/* input */
.input-area{flex-shrink:0;padding:6px 12px 12px}
.input-bar{background:#111118;border:1.5px solid #ffffff1a;border-radius:14px;padding:4px 4px 4px 14px;display:flex;align-items:flex-end;gap:6px}
textarea{flex:1;background:none;border:none;outline:none;color:#e8e8f0;font-size:15px;line-height:1.5;resize:none;padding:9px 0;font-family:inherit;max-height:100px;overflow-y:auto}
.mic-btn{width:42px;height:42px;border-radius:12px;flex-shrink:0;border:1.5px solid;font-size:20px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;background:none}
.mic-btn.idle{border-color:color-mix(in srgb,var(--c) 40%,transparent);background:color-mix(in srgb,var(--c) 10%,transparent)}
.mic-btn.recording{border-color:#ff4444;background:radial-gradient(circle,#ff444455,#ff000033);animation:micPulse 1s infinite}
.send-btn{width:42px;height:42px;border-radius:12px;flex-shrink:0;border:none;font-size:17px;display:flex;align-items:center;justify-content:center;font-weight:700;cursor:pointer;transition:all .15s}
.hint{text-align:center;color:#444;font-size:11px;margin-top:6px}

/* install banner */
.install-banner{background:#0d1520;border:1px solid #1a2a3a;border-radius:14px;padding:14px;margin-bottom:16px;font-size:13px;color:#6aa;line-height:1.6}
.install-banner strong{color:#88ccff}
.install-banner .steps{margin-top:8px;color:#5a9a}

.back-btn{background:none;border:none;color:#888;cursor:pointer;font-size:14px;padding:0 0 18px;display:flex;align-items:center;gap:5px}

@keyframes bounce{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes micPulse{0%,100%{box-shadow:0 0 0 0 #ff444455}50%{box-shadow:0 0 0 8px #ff444400}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
</style>
</head>
<body>

<!-- LEVEL SCREEN -->
<div class="screen active" id="levelScreen">
  <div class="topbar">
    <div class="logo"><div class="logo-icon">🗣️</div>Speak<span id="la" style="color:var(--c)">Up</span></div>
  </div>

  <div id="installBanner" class="install-banner">
    📱 <strong>ホーム画面に追加する方法</strong>
    <div class="steps">
      1. SafariでこのページをSafariで開く<br>
      2. 下の共有ボタン（□↑）をタップ<br>
      3.「ホーム画面に追加」をタップ<br>
      4. 次回からアイコンで起動できます！
    </div>
    <button onclick="document.getElementById('installBanner').style.display='none'" style="margin-top:8px;background:none;border:1px solid #2a4a3a;color:#4a8a6a;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer">閉じる</button>
  </div>

  <div class="hero">
    <h1>Your English<br><span style="color:#4ade80">Practice Partner</span></h1>
    <p>🎙️ 話すだけで英語練習できる</p>
  </div>
  <p class="sec-label">レベルを選んでください</p>
  <button class="level-btn" style="--lc:#4ade80" onclick="selectLevel('beginner','Beginner','🌱','#4ade80')">
    <div class="lv-icon" style="--lc:#4ade80">🌱</div>
    <div><div class="lv-name">Beginner</div><div class="lv-desc">簡単な単語と短い文</div></div>
    <span style="margin-left:auto;color:#444;font-size:16px">›</span>
  </button>
  <button class="level-btn" style="--lc:#facc15" onclick="selectLevel('intermediate','Intermediate','🌿','#facc15')">
    <div class="lv-icon" style="--lc:#facc15">🌿</div>
    <div><div class="lv-name">Intermediate</div><div class="lv-desc">日常会話</div></div>
    <span style="margin-left:auto;color:#444;font-size:16px">›</span>
  </button>
  <button class="level-btn" style="--lc:#f97316" onclick="selectLevel('advanced','Advanced','🌳','#f97316')">
    <div class="lv-icon" style="--lc:#f97316">🌳</div>
    <div><div class="lv-name">Advanced</div><div class="lv-desc">複雑なトピック・ニュアンス</div></div>
    <span style="margin-left:auto;color:#444;font-size:16px">›</span>
  </button>
</div>

<!-- TOPIC SCREEN -->
<div class="screen" id="topicScreen">
  <div class="topbar">
    <div class="logo" onclick="showScreen('levelScreen')"><div class="logo-icon">🗣️</div>Speak<span style="color:var(--c)">Up</span></div>
  </div>
  <button class="back-btn" onclick="showScreen('levelScreen')">‹ Back</button>
  <div style="margin-bottom:22px">
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:6px">
      <span id="topicEmoji" style="font-size:22px"></span>
      <h2 id="topicTitle" style="font-weight:700;font-size:20px"></h2>
    </div>
    <p style="color:#888;font-size:13px">今日は何について話しますか？</p>
  </div>
  <div class="topic-grid" id="topicGrid"></div>
</div>

<!-- CHAT SCREEN -->
<div class="screen" id="chatScreen">
  <div class="chat-inner">
    <div class="chat-topbar">
      <button class="logo" onclick="resetApp()" style="font-size:16px"><div class="logo-icon" style="width:30px;height:30px;font-size:15px">🗣️</div>Speak<span style="color:var(--c)">Up</span></button>
      <div style="display:flex;align-items:center;gap:6px">
        <button id="speakToggle" class="hbtn" onclick="toggleAutoSpeak()">🔊</button>
        <span id="levelChip" class="chip"></span>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="status st-speak" id="stSpeak">🔊 Speaking… <button class="stop-btn" onclick="stopSpeak()">✕</button></div>
    <div class="status st-listen" id="stListen"><span class="rec-dot"></span> 聞いています… もう一度タップで送信</div>
    <div class="input-area">
      <div class="input-bar">
        <textarea id="txt" rows="1" placeholder="🎙️ マイクを押して話す、またはここに入力…" oninput="onInput(this)" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendText()}"></textarea>
        <button id="micBtn" class="mic-btn idle" onclick="handleMic()">🎙️</button>
        <button id="sendBtn" class="send-btn" onclick="sendText()" style="background:#ffffff15;color:#555;cursor:not-allowed">↑</button>
      </div>
      <p class="hint">🎙️ タップして話す → もう一度タップで送信</p>
    </div>
  </div>
</div>

<script>
// ── DATA ──────────────────────────────────────────────────────────────
const TOPICS={
  beginner:[
    {id:"self_intro",label:"Self Introduction",icon:"👋",prompt:"You are a friendly English teacher for complete beginners. Practice self-introduction. Use very simple words and short sentences. Ask one question at a time. Correct mistakes gently. Max 3 sentences per response."},
    {id:"daily",label:"Daily Routine",icon:"☀️",prompt:"You are a friendly English teacher for beginners. Practice daily routine vocabulary with simple present tense. One question at a time. Max 3 sentences."},
    {id:"food",label:"Food & Drinks",icon:"🍱",prompt:"You are a friendly English teacher for beginners. Practice food vocabulary. Simple words only. Max 3 sentences."},
    {id:"weather",label:"Weather",icon:"🌤️",prompt:"You are a friendly English teacher for beginners. Practice weather expressions. Max 3 sentences."},
  ],
  intermediate:[
    {id:"travel",label:"Travel Plans",icon:"✈️",prompt:"You are an engaging English conversation partner for intermediate learners. Discuss travel. Naturally model correct grammar if mistakes occur. 2-4 sentences."},
    {id:"movies",label:"Movies & TV",icon:"🎬",prompt:"You are a fun English conversation partner for intermediate learners. Chat about movies and TV. Weave corrections naturally. 2-4 sentences."},
    {id:"work",label:"Work & Career",icon:"💼",prompt:"You are a professional English conversation partner for intermediate learners. Discuss jobs and career goals. 2-4 sentences."},
    {id:"hobbies",label:"Hobbies",icon:"🎨",prompt:"You are a friendly English conversation partner for intermediate learners. Chat about hobbies. 2-4 sentences."},
  ],
  advanced:[
    {id:"debate",label:"Debate & Opinion",icon:"🎤",prompt:"You are a sophisticated debate partner for advanced English learners. Challenge arguments respectfully. 3-5 sentences."},
    {id:"culture",label:"Culture & Society",icon:"🌍",prompt:"You are an insightful conversation partner for advanced learners. Discuss cultural and global issues. 3-5 sentences."},
    {id:"tech",label:"Technology",icon:"🤖",prompt:"You are a knowledgeable conversation partner for advanced learners. Discuss technology and AI. 3-5 sentences."},
    {id:"business",label:"Business",icon:"📈",prompt:"You are a sharp business conversation partner for advanced learners. 3-5 sentences."},
  ]
};
const SUFFIX=" Always respond in English only. Be concise since responses are read aloud. End with one follow-up question.";

// ── STATE ─────────────────────────────────────────────────────────────
let curLevel=null,curColor="#4ade80",curTopic=null;
let msgs=[],loading=false,autoSpeak=true,isListening=false;
let recognition=null;

// ── COLOR ─────────────────────────────────────────────────────────────
function setC(c){document.documentElement.style.setProperty('--c',c);curColor=c;}

// ── SCREENS ───────────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function selectLevel(id,label,emoji,color){
  curLevel={id,label,emoji,color};setC(color);
  document.getElementById('topicEmoji').textContent=emoji;
  document.getElementById('topicTitle').textContent=label+' Topics';
  const g=document.getElementById('topicGrid');g.innerHTML='';
  TOPICS[id].forEach(t=>{
    const b=document.createElement('button');
    b.className='topic-btn';
    b.innerHTML=`<div class="t-icon">${t.icon}</div><div class="t-label">${t.label}</div>`;
    b.onclick=()=>startChat(t);
    g.appendChild(b);
  });
  showScreen('topicScreen');
}

function startChat(t){
  curTopic=t;msgs=[];
  document.getElementById('messages').innerHTML='';
  document.getElementById('levelChip').textContent=curLevel.label+' · '+t.label;
  document.getElementById('txt').value='';
  setSend(false);
  showScreen('chatScreen');
  // Auto-start conversation immediately
  beginConversation(t);
}

function resetApp(){
  stopSpeak();stopRec();
  showScreen('levelScreen');
  curTopic=null;msgs=[];
}

// ── GEMINI API（無料） ─────────────────────────────────────────────
function getKey(){return localStorage.getItem('gemini_key')||'';}
function saveKey(k){localStorage.setItem('gemini_key',k);}

function showKeyModal(onSuccess){
  const existing=getKey();
  const modal=document.createElement('div');
  modal.style.cssText='position:fixed;inset:0;background:#000000cc;display:flex;align-items:center;justify-content:center;z-index:999;padding:20px';
  modal.innerHTML=`
    <div style="background:#141420;border:1px solid #ffffff22;border-radius:18px;padding:24px;max-width:380px;width:100%">
      <h3 style="margin:0 0 8px;font-weight:700;font-size:18px">🔑 Google AIキーを入力</h3>
      <p style="color:#888;font-size:13px;margin:0 0 16px;line-height:1.6">
        Google AI StudioのAPIキーを入力してください。<br>
        <a href="https://aistudio.google.com/apikey" target="_blank" style="color:#4ade80">aistudio.google.com</a> で無料取得できます。<br>
        キーはこのデバイスにのみ保存されます。
      </p>
      <input id="keyInput" type="password" placeholder="APIキーを貼り付け..." value="${existing}"
        style="width:100%;padding:10px 14px;border-radius:10px;border:1px solid #ffffff22;background:#0a0a0f;color:#fff;font-size:14px;outline:none;box-sizing:border-box"/>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button id="keySave" style="flex:1;padding:10px;border-radius:10px;background:#4ade80;border:none;color:#000;font-weight:700;cursor:pointer;font-size:14px">保存して開始</button>
        <button id="keyCancel" style="padding:10px 14px;border-radius:10px;background:#ffffff10;border:1px solid #ffffff22;color:#888;cursor:pointer;font-size:14px">キャンセル</button>
      </div>
    </div>`;
  document.body.appendChild(modal);
  const inp=modal.querySelector('#keyInput');
  inp.focus();
  modal.querySelector('#keySave').onclick=()=>{
    const k=inp.value.trim();
    if(!k){alert('APIキーを入力してください');return;}
    saveKey(k);
    modal.remove();
    onSuccess?.();
  };
  modal.querySelector('#keyCancel').onclick=()=>modal.remove();
  inp.onkeydown=e=>{if(e.key==='Enter')modal.querySelector('#keySave').click();};
}

async function claude(history){
  let key=getKey();
  if(!key){
    return new Promise(resolve=>{
      showKeyModal(async()=>{
        const reply=await claude(history);
        resolve(reply);
      });
    });
  }
  // Gemini APIのフォーマットに変換
  const systemPrompt=curTopic.prompt+SUFFIX;
  const contents=history.map(m=>({
    role: m.role==='assistant'?'model':'user',
    parts:[{text:m.content}]
  }));
  const r=await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`,{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      system_instruction:{parts:[{text:systemPrompt}]},
      contents:contents,
      generationConfig:{maxOutputTokens:1000}
    })
  });
  const d=await r.json();
  if(!r.ok){
    console.error('Gemini error:',JSON.stringify(d));
    if(r.status===401||r.status===403||r.status===400){
      localStorage.removeItem('gemini_key');
      alert('APIキーエラー\n' + (d?.error?.message||'status:'+r.status) + '\n\nもう一度キーを入力してください。');
    }
    throw new Error(d?.error?.message||'API error');
  }
  const txt=d.candidates?.[0]?.content?.parts?.[0]?.text;
  if(!txt){console.error('Empty response:',JSON.stringify(d));}
  return txt||"Sorry, I didn't get a response. Please try again!";
}

async function beginConversation(t){
  setLoading(true);
  try{
    const reply=await claude([{role:"user",content:`Greet the student warmly and ask your first question about "${t.label}".`}]);
    addMsg("assistant",reply);
    if(autoSpeak)doSpeak(reply);
  }catch{
    addMsg("assistant","Hello! Let's practice English! Ready?");
  }
  setLoading(false);
}

async function sendText(override){
  const txt=(override||document.getElementById('txt').value).trim();
  if(!txt||loading)return;
  stopSpeak();
  addMsg("user",txt);
  document.getElementById('txt').value='';
  setSend(false);
  setLoading(true);
  const hist=[];let skip=true;
  for(const m of msgs){
    if(skip&&m.role==="assistant"){skip=false;continue;}
    hist.push({role:m.role,content:m.content});
  }
  try{
    const reply=await claude(hist.length?hist:[{role:"user",content:txt}]);
    addMsg("assistant",reply);
    if(autoSpeak)doSpeak(reply);
  }catch{
    addMsg("assistant","Sorry, error. Please try again!");
  }
  setLoading(false);
}

// ── MESSAGES ──────────────────────────────────────────────────────────
function addMsg(role,content){
  msgs.push({role,content});
  const box=document.getElementById('messages');
  const row=document.createElement('div');
  row.className='msg-row'+(role==='user'?' user':'');
  if(role==='assistant'){
    const av=document.createElement('div');av.className='avatar';av.textContent='🤖';
    row.appendChild(av);
  }
  const bub=document.createElement('div');bub.className='bubble';bub.textContent=content;
  if(role==='assistant'){
    const rb=document.createElement('button');rb.className='replay-btn';rb.textContent='🔉';
    rb.onclick=()=>{stopSpeak();doSpeak(content);};
    bub.appendChild(rb);
  }
  row.appendChild(bub);box.appendChild(row);
  box.scrollTop=box.scrollHeight;
}

function setLoading(v){
  loading=v;
  const box=document.getElementById('messages');
  document.getElementById('typingRow')?.remove();
  if(v){
    const row=document.createElement('div');row.className='msg-row';row.id='typingRow';
    const av=document.createElement('div');av.className='avatar';av.textContent='🤖';
    const bub=document.createElement('div');bub.className='bubble';
    bub.innerHTML='<div class="dots">'+[0,1,2].map(d=>`<span class="dot" style="--d:${d*.2}s"></span>`).join('')+'</div>';
    row.appendChild(av);row.appendChild(bub);box.appendChild(row);
    box.scrollTop=box.scrollHeight;
  }
}

// ── TTS ───────────────────────────────────────────────────────────────
function doSpeak(text){
  const s=window.speechSynthesis;if(!s)return;
  s.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='en-US';u.rate=0.93;u.pitch=1.05;
  const vs=s.getVoices();
  const pick=vs.find(v=>['Samantha','Karen','Google US','Daniel'].some(n=>v.name.includes(n))&&v.lang.startsWith('en'))||vs.find(v=>v.lang==='en-US');
  if(pick)u.voice=pick;
  const el=document.getElementById('stSpeak');
  u.onstart=()=>el.classList.add('show');
  u.onend=u.onerror=()=>el.classList.remove('show');
  s.speak(u);
}
function stopSpeak(){window.speechSynthesis?.cancel();document.getElementById('stSpeak').classList.remove('show');}
function toggleAutoSpeak(){autoSpeak=!autoSpeak;document.getElementById('speakToggle').textContent=autoSpeak?'🔊':'🔇';if(!autoSpeak)stopSpeak();}
window.speechSynthesis?.addEventListener('voiceschanged',()=>window.speechSynthesis.getVoices());
// iOS Safari workaround: resume context on first touch
document.addEventListener('touchstart',()=>{window.speechSynthesis?.resume();},{once:true});

// ── SPEECH RECOGNITION ───────────────────────────────────────────────
const SR=window.SpeechRecognition||window.webkitSpeechRecognition;

function handleMic(){
  if(!SR){alert('音声認識を使うにはSafariで開いてください。');return;}
  isListening?stopRec():startRec();
}

function startRec(){
  recognition=new SR();
  recognition.lang='en-US';
  recognition.interimResults=true;
  recognition.continuous=false;
  let final='';
  recognition.onstart=()=>{
    isListening=true;
    document.getElementById('micBtn').classList.replace('idle','recording');
    document.getElementById('stListen').classList.add('show');
  };
  recognition.onresult=e=>{
    let interim='';final='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal)final+=e.results[i][0].transcript;
      else interim+=e.results[i][0].transcript;
    }
    document.getElementById('txt').value=final||interim;
    setSend(!!(final||interim));
  };
  recognition.onend=()=>{
    isListening=false;
    document.getElementById('micBtn').classList.replace('recording','idle');
    document.getElementById('stListen').classList.remove('show');
    if(final.trim())sendText(final.trim());
  };
  recognition.onerror=e=>{
    isListening=false;
    document.getElementById('micBtn').classList.replace('recording','idle');
    document.getElementById('stListen').classList.remove('show');
    if(e.error==='not-allowed')alert('マイクのアクセスを許可してください。\nSafari設定 → このWebサイト → マイク → 許可');
  };
  recognition.start();
}
function stopRec(){recognition?.stop();}

// ── UI ────────────────────────────────────────────────────────────────
function setSend(v){
  const b=document.getElementById('sendBtn');
  b.style.background=v?curColor:'#ffffff15';
  b.style.color=v?'#000':'#555';
  b.style.cursor=v?'pointer':'not-allowed';
}
function onInput(el){
  setSend(!!el.value.trim());
  el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';
}

// Hide install banner if already in standalone (PWA) mode
if(window.navigator.standalone)document.getElementById('installBanner').style.display='none';
</script>
